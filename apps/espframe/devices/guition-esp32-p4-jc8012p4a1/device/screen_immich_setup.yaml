# =============================================================================
# SCREEN: IMMICH SETUP
# =============================================================================
# Shown when WiFi is connected but Immich URL or API key are not configured.
# Directs the user to the device web UI to enter their Immich credentials.
# =============================================================================

lvgl:
  pages:
    - id: immich_setup_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - obj:
            width: ${display_width}
            height: ${display_height}
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.stop: setup_screen_dim
                - script.execute: backlight_apply_brightness
                - script.execute: setup_screen_dim
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_cog
                        text_color: 0xFFFFFF
                        text_align: center
                    - label:
                        text: "Immich Setup"
                        text_font: noto_400_46_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        text: "Open your browser and go to"
                        text_font: noto_400_30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center
                    - label:
                        id: setup_ip_label
                        text: "http://..."
                        text_font: noto_400_46_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        text: "to configure your Immich URL\nand API key"
                        text_font: noto_400_30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center
