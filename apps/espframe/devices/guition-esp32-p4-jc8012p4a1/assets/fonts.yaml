# -----------------------------------------------------------------------------
# Clock and numeric (minimal glyph set for lower memory)
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Noto Sans@325"
    id: noto_325_150_font
    size: 150
    bpp: 4
    glyphs: " 0123456789:"

# -----------------------------------------------------------------------------
# UI and setup text (full Latin + extended glyphs)
# -----------------------------------------------------------------------------
  - file: "gfonts://Noto Sans@400"
    id: noto_400_46_font
    size: 46
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_30_font
    size: 30
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_28_font
    size: 28
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_32_font
    size: 32
    bpp: 4
    glyphs: "${latin_extended_glyphs}${greek_cyrillic_vietnamese_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_location_400_36_font
    size: 36
    bpp: 4
    glyphsets:
      - GF_Latin_Core
      - GF_Latin_Beyond
      - GF_Latin_Vietnamese
      - GF_Greek_Core
      - GF_Cyrillic_Plus
    glyphs: "${latin_extended_glyphs}${greek_cyrillic_vietnamese_glyphs}"
    extras:
      - file: "gfonts://Noto Sans Arabic@400"
        glyphs: "${arabic_location_glyphs}"
      - file: "gfonts://Noto Sans Hebrew@400"
        glyphs: "${hebrew_location_glyphs}"
