# =============================================================================
# FONTS - Clock, UI, and slideshow text
# =============================================================================
# Noto Sans at multiple sizes. The 150px clock font uses a minimal glyph set
# for digits; smaller sizes include broader glyphs for setup screens and text.
# Location metadata uses broad Noto glyph coverage for Immich place names.
# Middle East scripts use script-specific Noto extras so the main location font
# can keep its existing European coverage.
# =============================================================================

substitutions:
  latin_extended_glyphs: >-
    !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~
    ВЎВҝГҖГҒГӮГғГ„Г…ГҶГҮГҲГүГҠГӢГҢГҚГҺГҸГҗГ‘Г’Г“Г”Г•Г–Г—ГҳГҷГҡГӣГңГқГһГҹГ ГЎГўГЈГӨГҘГҰГ§ГЁГ©ГӘГ«Г¬ГӯГ®ГҜГ°ГұГІГіГҙГөГ¶Г·ГёГ№ГәГ»ГјГҪГҫГҝДҖДҒДӮДғД„Д…ДҶДҮДҲДүДҠДӢДҢДҚДҺДҸДҗД‘Д’Д“Д”Д•Д–Д—ДҳДҷДҡДӣДңДқДһДҹД ДЎДўДЈДӨДҘДҰД§ДЁД©ДӘД«Д¬ДӯД®ДҜД°ДұДІДіДҙДөД¶Д·ДёД№ДәД»ДјДҪДҫДҝЕҖЕҒЕӮЕғЕ„Е…ЕҶЕҮЕҲЕүЕҠЕӢЕҢЕҚЕҺЕҸЕҗЕ‘Е’Е“Е”Е•Е–Е—ЕҳЕҷЕҡЕӣЕңЕқЕһЕҹЕ ЕЎЕўЕЈЕӨЕҘЕҰЕ§ЕЁЕ©ЕӘЕ«Е¬ЕӯЕ®ЕҜЕ°ЕұЕІЕіЕҙЕөЕ¶Е·ЕёЕ№ЕәЕ»ЕјЕҪЕҫвҖ”вҖ“вҖҗвҖҰВ·ВөВ©В®в„ўВ«В»В°вҖўвӮ¬ВЈВҘВўВӘВәвҖ 
