# -----------------------------------------------------------------------------
# Clock (minimal glyph set for lower memory)
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Noto Sans@325"
    id: noto_325_54_font
    size: 54
    bpp: 4
    glyphs: " 0123456789:"

# -----------------------------------------------------------------------------
# UI and setup text (full Latin + extended glyphs)
# -----------------------------------------------------------------------------
  - file: "gfonts://Noto Sans@400"
    id: noto_400_20_font
    size: 20
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_16_font
    size: 16
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_13_font
    size: 13
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_400_12_font
    size: 12
    bpp: 4
    glyphs: "${latin_extended_glyphs}${greek_cyrillic_vietnamese_glyphs}"

  - file: "gfonts://Noto Sans@400"
    id: noto_location_400_13_font
    size: 13
    bpp: 4
    glyphsets:
      - GF_Latin_Core
      - GF_Latin_Beyond
      - GF_Latin_Vietnamese
      - GF_Greek_Core
      - GF_Cyrillic_Plus
    glyphs: "${latin_extended_glyphs}${greek_cyrillic_vietnamese_glyphs}"
    extras:
      - file: "gfonts://Noto Sans Arabic@400"
        glyphs: "${arabic_location_glyphs}"
      - file: "gfonts://Noto Sans Hebrew@400"
        glyphs: "${hebrew_location_glyphs}"
