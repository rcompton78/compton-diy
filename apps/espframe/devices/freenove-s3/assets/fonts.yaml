# =============================================================================
# FONTS - Clock, UI, and slideshow text
# =============================================================================
# Noto Sans at multiple sizes, scaled down for the 240x320 display (the
# guition-esp32-p4-jc8012p4a1 device uses much larger sizes for its 1280x800
# canvas). The clock font uses a minimal glyph set for digits; other sizes
# include broader glyphs for setup screens and text. Location metadata uses
# broad Noto glyph coverage for Immich place names. Middle East scripts use
# script-specific Noto extras so the main location font can keep its existing
# European coverage.
# =============================================================================

