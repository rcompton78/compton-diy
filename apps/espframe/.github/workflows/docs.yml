name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'product/**'
      - 'scripts/firmware_release.py'
      - 'scripts/product_config.py'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docs:
    name: Build Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/.vitepress/dist

  download-firmware:
    name: Download Firmware
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/firmware_release.py
            scripts/product_config.py
            product/contract/devices.json
            product/contract/manifest.json
            product/contract/project.json
            product/contract/settings.json
          sparse-checkout-cone-mode: false

      - name: Load product firmware metadata
        run: python3 scripts/product_config.py github-env >> "$GITHUB_ENV"

      - name: Set release metadata
        id: release-meta
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          RELEASE_TAG=$(gh release view --json tagName -q .tagName)
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          STABLE_MANIFEST_DIR=$(dirname "$DEFAULT_PUBLIC_MANIFEST")
          mkdir -p "$STABLE_MANIFEST_DIR"
          gh release download "$RELEASE_TAG" \
            --pattern "*.factory.bin" \
            --pattern "*.ota.bin" \
            --dir "$STABLE_MANIFEST_DIR" \
            --clobber
          for SLUG in $DEVICE_SLUGS; do
            gh release download "$RELEASE_TAG" \
              --pattern "${SLUG}.manifest.json" \
              --dir "$STABLE_MANIFEST_DIR" \
              --clobber 2>/dev/null || true
          done
          if [ -f "${STABLE_MANIFEST_DIR}/${DEFAULT_DEVICE_SLUG}.manifest.json" ]; then
            cp "${STABLE_MANIFEST_DIR}/${DEFAULT_DEVICE_SLUG}.manifest.json" "$DEFAULT_PUBLIC_MANIFEST"
          else
            gh release download "$RELEASE_TAG" \
              --pattern "$(basename "$DEFAULT_PUBLIC_MANIFEST")" \
              --dir "$STABLE_MANIFEST_DIR" \
              --clobber
          fi

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          BETA_TAG=$(gh release list --limit 20 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[0].tagName // empty')
          if [ -n "$BETA_TAG" ]; then
            BETA_MANIFEST_DIR=$(dirname "$DEFAULT_PUBLIC_BETA_MANIFEST")
            mkdir -p "$BETA_MANIFEST_DIR"
            gh release download "$BETA_TAG" \
              --pattern "*.factory.bin" \
              --pattern "*.ota.bin" \
              --dir "$BETA_MANIFEST_DIR" \
              --clobber 2>/dev/null || true
            for SLUG in $DEVICE_SLUGS; do
              gh release download "$BETA_TAG" \
                --pattern "${SLUG}.manifest.json" \
                --dir "$BETA_MANIFEST_DIR" \
                --clobber 2>/dev/null || true
            done
            if [ -f "${BETA_MANIFEST_DIR}/${DEFAULT_DEVICE_SLUG}.manifest.json" ]; then
              cp "${BETA_MANIFEST_DIR}/${DEFAULT_DEVICE_SLUG}.manifest.json" "$DEFAULT_PUBLIC_BETA_MANIFEST"
            else
              gh release download "$BETA_TAG" \
                --pattern "$(basename "$DEFAULT_PUBLIC_BETA_MANIFEST")" \
                --dir "$BETA_MANIFEST_DIR" \
                --clobber 2>/dev/null || true
            fi
          fi

      - name: Verify firmware assets
        run: >-
          python3 scripts/firmware_release.py verify-directory
          --version "$RELEASE_TAG"
          --dir firmware
          --slugs $DEVICE_SLUGS

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: firmware/

  deploy-docs:
    name: Deploy Docs
    needs: [build-docs, download-firmware]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/firmware_release.py
            scripts/product_config.py
            product/contract/devices.json
            product/contract/manifest.json
            product/contract/project.json
            product/contract/settings.json
          sparse-checkout-cone-mode: false

      - name: Load product docs metadata
        run: python3 scripts/product_config.py github-env >> "$GITHUB_ENV"

      - name: Download docs artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: dist

      - name: Clear bundled firmware placeholders
        run: rm -rf dist/firmware

      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: firmware
          path: dist/firmware

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify public firmware
        run: >-
          python3 scripts/firmware_release.py verify-pages
          --version "${{ needs.download-firmware.outputs.release_tag }}"
          --base-url "$PUBLIC_BASE_URL"
          --slugs $DEVICE_SLUGS
          --retries 10
          --delay 15
