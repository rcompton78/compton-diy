# =============================================================================
# DEVELOPER FEATURES - runtime gate for in-progress experiences
# =============================================================================
# This package is included in normal firmware so development experiences can be
# compiled into release builds, but they must stay inactive unless this switch
# is turned on from the hidden developer panel in the web UI.
# =============================================================================

globals:
  - id: developer_features_saved
    type: bool
    restore_value: true
    initial_value: 'false'

esphome:
  on_boot:
    - priority: -100
      then:
        - if:
            condition:
              lambda: 'return id(developer_features_saved);'
            then:
              - switch.turn_on: developer_features_enabled
            else:
              - switch.turn_off: developer_features_enabled

switch:
  - platform: template
    name: "Developer: Features"
    id: developer_features_enabled
    internal: true
    entity_category: config
    icon: "mdi:flask-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    web_server:
      sorting_group_id: sg_developer
    on_turn_on:
      then:
        - lambda: 'id(developer_features_saved) = true;'
    on_turn_off:
      then:
        - lambda: 'id(developer_features_saved) = false;'
        - script.execute: screen_apply_rotation
