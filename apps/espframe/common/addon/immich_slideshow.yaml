# =============================================================================
# IMMICH SLIDESHOW - Ring buffer, display, and navigation
# =============================================================================
# 3-slot ring buffer of remote_image components for instant swiping. Two
# images are prefetched ahead; touch/swipe advances or goes back. Portrait
# pairs are detected and displayed side-by-side; backward navigation
# re-downloads from stored URL. Slot and display state use custom structs
# (SlotMeta, DisplayMeta) defined in device config.
# =============================================================================

substitutions:
  # remote_image requires a syntactically valid initial URL. Keep it on the
  # device so boot never depends on a public placeholder service.
  immich_image_initial_url: "http://127.0.0.1/espframe/image-not-loaded"

# -----------------------------------------------------------------------------
# Globals: local interaction state only. The C++ slideshow service owns the
# ring buffer, display, portrait, preload, navigation, and diagnostic state.
# -----------------------------------------------------------------------------
globals:
  - id: last_short_tap_ms
    type: uint32_t
    initial_value: '0'
  - id: last_photo_displayed_ms
    type: uint32_t
    initial_value: '0'
  - id: photo_source_menu_open
    type: bool
    initial_value: 'false'
  - id: photo_source_swipe_triggered
    type: bool
    initial_value: 'false'
  - id: photo_source_menu_touch_handled
    type: bool
    initial_value: 'false'
  - id: photo_source_menu_selection_index
    type: int
    initial_value: '0'

# -----------------------------------------------------------------------------
# Metadata display mode (persisted across reboots)
# -----------------------------------------------------------------------------
select:
  - platform: template
    name: "Device: Metadata Date Format"
    id: photo_metadata_date_format
    internal: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_format START
    options:
      - "Relative Date"
      - "Date Taken"
    initial_option: "Date Taken"
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_format END
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_device
    on_value:
      then:
        - script.execute: update_photo_metadata_display

  - platform: template
    name: "Device: Metadata Date Taken Format"
    id: photo_metadata_date_taken_format
    internal: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_taken_format START
    options:
      - "1 January, 2026"
      - "January 1, 2026"
    initial_option: "1 January, 2026"
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_taken_format END
    icon: "mdi:calendar-month"
    web_server:
      sorting_group_id: sg_device
    on_value:
      then:
        - script.execute: update_photo_metadata_display

# -----------------------------------------------------------------------------
# Portrait pairing and metadata toggles (persisted across reboots)
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Photos: Portrait Pairing"
    id: portrait_pairing_enabled
    internal: true
    optimistic: true
    # ESPFRAME:SETTING_FIELDS portrait_pairing START
    restore_mode: RESTORE_DEFAULT_ON
    # ESPFRAME:SETTING_FIELDS portrait_pairing END
    icon: "mdi:image-multiple"
    web_server:
      sorting_group_id: sg_photos

  - platform: template
    name: "Device: Metadata Date"
    id: photo_metadata_date_enabled
    internal: true
    optimistic: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_enabled START
    restore_mode: RESTORE_DEFAULT_ON
    # ESPFRAME:SETTING_FIELDS photo_metadata_date_enabled END
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_device
    on_turn_on:
      then:
        - script.execute: update_photo_metadata_display
    on_turn_off:
      then:
        - script.execute: update_photo_metadata_display

  - platform: template
    name: "Device: Metadata Location"
    id: photo_metadata_location_enabled
    internal: true
    optimistic: true
    # ESPFRAME:SETTING_FIELDS photo_metadata_location_enabled START
    restore_mode: RESTORE_DEFAULT_ON
    # ESPFRAME:SETTING_FIELDS photo_metadata_location_enabled END
    icon: "mdi:map-marker-outline"
    web_server:
      sorting_group_id: sg_device
    on_turn_on:
      then:
        - script.execute: update_photo_metadata_display
    on_turn_off:
      then:
        - script.execute: update_photo_metadata_display

# -----------------------------------------------------------------------------
# 3-slot full-size ring buffer and portrait pair / preload remote_image components
# -----------------------------------------------------------------------------
remote_image:
  - id: immich_img_0
    url: "${immich_image_initial_url}"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 0;
            auto &meta = id(espframe_core).slideshow().state().slot0;
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().download_retries, id(espframe_core).slideshow().state().active_slot, id(portrait_pairing_enabled).state,
              id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().current_display, id(espframe_core).slideshow().state().portrait,
              id(espframe_core).slideshow().state().companion_target_slot, id(espframe_core).slideshow().state().portrait_preload_slot,
              id(espframe_core).slideshow().state().portrait_search_datetime, id(espframe_core).slideshow().state().portrait_primary_asset_id);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              0, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().last_downloaded_slot, "slot0 image error");
            id(espframe_slideshow_dispatch).execute();

  - id: immich_img_1
    url: "${immich_image_initial_url}"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 1;
            auto &meta = id(espframe_core).slideshow().state().slot1;
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().download_retries, id(espframe_core).slideshow().state().active_slot, id(portrait_pairing_enabled).state,
              id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().current_display, id(espframe_core).slideshow().state().portrait,
              id(espframe_core).slideshow().state().companion_target_slot, id(espframe_core).slideshow().state().portrait_preload_slot,
              id(espframe_core).slideshow().state().portrait_search_datetime, id(espframe_core).slideshow().state().portrait_primary_asset_id);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              1, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().last_downloaded_slot, "slot1 image error");
            id(espframe_slideshow_dispatch).execute();

  - id: immich_img_2
    url: "${immich_image_initial_url}"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 2;
            auto &meta = id(espframe_core).slideshow().state().slot2;
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().download_retries, id(espframe_core).slideshow().state().active_slot, id(portrait_pairing_enabled).state,
              id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().current_display, id(espframe_core).slideshow().state().portrait,
              id(espframe_core).slideshow().state().companion_target_slot, id(espframe_core).slideshow().state().portrait_preload_slot,
              id(espframe_core).slideshow().state().portrait_search_datetime, id(espframe_core).slideshow().state().portrait_primary_asset_id);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              2, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight,
              id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().last_downloaded_slot, "slot2 image error");
            id(espframe_slideshow_dispatch).execute();

  # Portrait pair half-width components (640x800 each, side-by-side)
  - id: immich_portrait_left
    url: "${immich_image_initial_url}"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: END
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait left ready");
            id(espframe_core).slideshow().on_portrait_left_finished(id(espframe_core).slideshow().state().portrait);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait left decode failed, falling back to single");
            id(espframe_core).slideshow().on_portrait_left_error(
              id(espframe_core).slideshow().state().portrait, id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().active_slot_displayed);
            id(espframe_slideshow_dispatch).execute();

  - id: immich_portrait_right
    url: "${immich_image_initial_url}"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: START
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait right ready");
            id(espframe_core).slideshow().on_portrait_right_finished(id(espframe_core).slideshow().state().portrait);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait right decode failed, falling back to single");
            id(espframe_core).slideshow().on_portrait_right_error(
              id(espframe_core).slideshow().state().portrait, id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().active_slot_displayed);
            id(espframe_slideshow_dispatch).execute();

  # Portrait preload components (downloaded during prefetch for instant pair display)
  - id: immich_portrait_preload_left
    url: "${immich_image_initial_url}"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: END
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait preload left ready (slot %d)", id(espframe_core).slideshow().state().portrait_preload_slot);
            id(espframe_core).slideshow().on_preload_left_finished(
              id(espframe_core).slideshow().state().portrait_preload_slot, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2,
              id(espframe_core).slideshow().state().portrait_preload_left_ready, id(espframe_core).slideshow().state().portrait_preload_right_ready,
              id(espframe_core).slideshow().state().preload_noncritical_in_flight, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight);
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload left failed");
            id(espframe_core).slideshow().on_preload_left_error(
              id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().portrait_preload_left_ready,
              id(espframe_core).slideshow().state().preload_noncritical_in_flight, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight);
            id(espframe_slideshow_dispatch).execute();

  - id: immich_portrait_preload_right
    url: "${immich_image_initial_url}"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: START
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait preload right ready (slot %d)", id(espframe_core).slideshow().state().portrait_preload_slot);
            id(espframe_core).slideshow().on_preload_right_finished(
              id(espframe_core).slideshow().state().portrait_preload_right_ready, id(espframe_core).slideshow().state().preload_noncritical_in_flight,
              id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight);
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload right failed");
            id(espframe_core).slideshow().on_preload_right_error(
              id(espframe_core).slideshow().state().diagnostic_reason, id(espframe_core).slideshow().state().portrait_preload_right_ready,
              id(espframe_core).slideshow().state().preload_noncritical_in_flight, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight);
            id(espframe_slideshow_dispatch).execute();

# -----------------------------------------------------------------------------
# Scripts: download error handler, display, advance, previous, prefetch
# -----------------------------------------------------------------------------
script:
  - id: espframe_slideshow_dispatch
    mode: queued
    then:
      - lambda: |-
          if (id(photo_source_menu_open)) return;
          SlideshowCommand cmd;
          while (id(espframe_core).slideshow().pop_command(cmd)) {
            switch (cmd.kind) {
              case SLIDESHOW_COMMAND_DISPLAY_CURRENT:
                id(immich_display_current).execute();
                break;
              case SLIDESHOW_COMMAND_START_ACTIVE_PAIR:
                id(immich_start_portrait_active).execute();
                break;
              case SLIDESHOW_COMMAND_FETCH_COMPANION:
                id(immich_fetch_portrait_companion).execute();
                break;
              case SLIDESHOW_COMMAND_PREFETCH_AFTER_DELAY:
                id(delayed_prefetch_chain).execute();
                break;
              case SLIDESHOW_COMMAND_LOG_DIAG:
                id(log_immich_diag).execute();
                break;
              case SLIDESHOW_COMMAND_HANDLE_SLOT_DOWNLOAD_ERROR:
                id(handle_slot_download_error).execute();
                break;
              case SLIDESHOW_COMMAND_FETCH_INTO_SLOT:
                id(espframe_core).slideshow().state().target_slot = cmd.slot;
                id(immich_fetch_into_slot).execute();
                break;
              case SLIDESHOW_COMMAND_UPDATE_SLOT_IMAGE:
                {
                  bool any_downloading = id(immich_img_0).is_downloading() ||
                                         id(immich_img_1).is_downloading() ||
                                         id(immich_img_2).is_downloading() ||
                                         id(immich_portrait_left).is_downloading() ||
                                         id(immich_portrait_right).is_downloading() ||
                                         id(immich_portrait_preload_left).is_downloading() ||
                                         id(immich_portrait_preload_right).is_downloading();
                  // Non-active slot updates are best-effort; defer them if network/decoder work
                  // is already active to avoid cascaded cancel/restart churn.
                  if (any_downloading && cmd.slot != id(espframe_core).slideshow().state().active_slot) {
                    id(delayed_prefetch_chain).execute();
                    break;
                  }
                  bool portrait_screen = id(screen_rotation_select).current_option() == "90" ||
                                         id(screen_rotation_select).current_option() == "270";
                  int target_w = portrait_screen ? ${portrait_display_width} : ${display_width};
                  int target_h = portrait_screen ? ${portrait_display_height} : ${display_height};
                  auto apply_slot_layout = [&](auto *img, SlotMeta &meta) {
                    bool fill = portrait_screen
                      ? (id(photo_display_mode).current_option() == "Fill")
                      : ((id(photo_display_mode).current_option() == "Fill") && !meta.is_portrait);
                    img->set_target_size(target_w, target_h);
                    img->set_fill_mode(fill);
                    img->set_vertical_align(portrait_screen ? esphome::remote_image::VERTICAL_ALIGN_START : esphome::remote_image::VERTICAL_ALIGN_CENTER);
                    img->update();
                  };
                  if (cmd.slot == 0) {
                    apply_slot_layout(id(immich_img_0), id(espframe_core).slideshow().state().slot0);
                  } else if (cmd.slot == 1) {
                    apply_slot_layout(id(immich_img_1), id(espframe_core).slideshow().state().slot1);
                  } else if (cmd.slot == 2) {
                    apply_slot_layout(id(immich_img_2), id(espframe_core).slideshow().state().slot2);
                  }
                }
                break;
              case SLIDESHOW_COMMAND_UPDATE_PORTRAIT_LEFT:
                id(immich_portrait_left).set_fill_mode(true);
                id(immich_portrait_left).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PORTRAIT_RIGHT:
                id(immich_portrait_right).set_fill_mode(true);
                id(immich_portrait_right).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PRELOAD_LEFT:
                id(immich_portrait_preload_left).set_fill_mode(true);
                id(immich_portrait_preload_left).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PRELOAD_RIGHT:
                id(immich_portrait_preload_right).set_fill_mode(true);
                id(immich_portrait_preload_right).update();
                break;
              case SLIDESHOW_COMMAND_START_PORTRAIT_LEFT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(espframe_core).slideshow().state().active_slot;
                auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
                id(immich_portrait_left).set_url(meta.image_url);
                id(deferred_portrait_left_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_START_PORTRAIT_RIGHT:
                id(immich_portrait_right).set_url(id(espframe_core).slideshow().state().portrait_companion_url);
                id(deferred_portrait_right_update).execute();
                break;
              case SLIDESHOW_COMMAND_DISPLAY_PORTRAIT_PAIR:
                id(immich_display_portrait_pair).execute();
                break;
              case SLIDESHOW_COMMAND_START_PRELOAD_LEFT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(espframe_core).slideshow().state().companion_target_slot;
                auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
                id(immich_portrait_preload_left).set_url(meta.image_url);
                id(deferred_preload_left_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_START_PRELOAD_RIGHT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(espframe_core).slideshow().state().portrait_preload_slot;
                auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
                id(immich_portrait_preload_right).set_url(meta.companion_url);
                id(deferred_preload_right_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_DEFER_COMPANION_SEARCH:
                id(deferred_companion_search).execute();
                break;
              case SLIDESHOW_COMMAND_ABORT_SLOT_DOWNLOAD:
                if (cmd.slot == 0) id(immich_img_0).abort_download();
                else if (cmd.slot == 1) id(immich_img_1).abort_download();
                else if (cmd.slot == 2) id(immich_img_2).abort_download();
                break;
              case SLIDESHOW_COMMAND_DEFER_FETCH_INTO_SLOT:
                id(espframe_core).slideshow().state().target_slot = cmd.slot;
                id(deferred_fetch_into_slot).execute();
                break;
              case SLIDESHOW_COMMAND_LOAD_PREVIOUS_SLOT: {
                int s = cmd.slot;
                auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
                bool portrait_screen = id(screen_rotation_select).current_option() == "90" ||
                                       id(screen_rotation_select).current_option() == "270";
                int target_w = portrait_screen ? ${portrait_display_width} : ${display_width};
                int target_h = portrait_screen ? ${portrait_display_height} : ${display_height};
                bool fill = portrait_screen
                  ? (id(photo_display_mode).current_option() == "Fill")
                  : ((id(photo_display_mode).current_option() == "Fill") && !meta.is_portrait);
                auto valign = portrait_screen ? esphome::remote_image::VERTICAL_ALIGN_START : esphome::remote_image::VERTICAL_ALIGN_CENTER;
                if (s == 0) { id(immich_img_0).set_target_size(target_w, target_h); id(immich_img_0).set_fill_mode(fill); id(immich_img_0).set_vertical_align(valign); id(immich_img_0).set_url(meta.image_url); id(immich_img_0).update(); }
                else if (s == 1) { id(immich_img_1).set_target_size(target_w, target_h); id(immich_img_1).set_fill_mode(fill); id(immich_img_1).set_vertical_align(valign); id(immich_img_1).set_url(meta.image_url); id(immich_img_1).update(); }
                else if (s == 2) { id(immich_img_2).set_target_size(target_w, target_h); id(immich_img_2).set_fill_mode(fill); id(immich_img_2).set_vertical_align(valign); id(immich_img_2).set_url(meta.image_url); id(immich_img_2).update(); }
                break;
              }
              case SLIDESHOW_COMMAND_LOG_NO_PREVIOUS:
                ESP_LOGI("immich", "No previous image available");
                break;
              case SLIDESHOW_COMMAND_DISPLAY_PRELOADED_PAIR:
                if (id(espframe_core).slideshow().state().portrait_preload_slot != id(espframe_core).slideshow().state().active_slot ||
                    !id(espframe_core).slideshow().state().portrait_preload_left_ready || !id(espframe_core).slideshow().state().portrait_preload_right_ready) {
                  ESP_LOGW("immich", "Preloaded pair not fully ready for active slot %d; deferring display", id(espframe_core).slideshow().state().active_slot);
                  id(espframe_core).slideshow().state().diagnostic_reason = "preloaded pair not ready";
                  id(log_immich_diag).execute();
                  id(delayed_prefetch_chain).execute();
                  break;
                }
                lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
                lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
                {
                  auto *left_dsc = get_lv_image_descriptor_(id(immich_portrait_preload_left), 0);
                  auto *right_dsc = get_lv_image_descriptor_(id(immich_portrait_preload_right), 0);
                  if (left_dsc == nullptr || right_dsc == nullptr ||
                      left_dsc->data == nullptr || right_dsc->data == nullptr ||
                      id(immich_portrait_preload_left).get_width() <= 0 || id(immich_portrait_preload_left).get_height() <= 0 ||
                      id(immich_portrait_preload_right).get_width() <= 0 || id(immich_portrait_preload_right).get_height() <= 0) {
                    ESP_LOGW("immich", "Preloaded portrait descriptor not ready; deferring pair display");
                    id(espframe_core).slideshow().state().diagnostic_reason = "preloaded pair descriptor not ready";
                    id(log_immich_diag).execute();
                    id(delayed_prefetch_chain).execute();
                    break;
                  }
                  lv_img_set_src(id(portrait_left_img), left_dsc);
                  lv_img_set_src(id(portrait_right_img), right_dsc);
                }
                id(extract_accent_color).execute();
                id(apply_warm_tones).execute();
                break;
              case SLIDESHOW_COMMAND_NONE:
              default:
                break;
            }
          }

  - id: show_photo_source_menu
    mode: single
    then:
      - lambda: |-
          if (!id(developer_features_enabled).state) return;
          if (lv_scr_act() != id(slideshow_page)->obj) return;
          id(backlight_hold_timer).stop();
          id(last_short_tap_ms) = 0;
          id(photo_source_menu_open) = true;
          lv_obj_set_size(id(photo_source_menu_overlay), lv_pct(100), lv_pct(100));
          lv_obj_align(id(photo_source_menu_overlay), LV_ALIGN_CENTER, 0, 0);
          lv_label_set_text(id(photo_source_menu_title), "Photo Source");
          lv_label_set_text(id(photo_source_menu_message), "");
          lv_obj_add_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
          const std::string current = id(photo_source_select).current_option();
          auto set_source_style = [&](lv_obj_t *label, const char *source) {
            const bool selected = current == source;
            lv_obj_set_style_text_color(label, lv_color_hex(selected ? 0xFFD166 : 0xFFFFFF), LV_PART_MAIN);
            lv_obj_set_style_text_opa(label, selected ? LV_OPA_COVER : LV_OPA_70, LV_PART_MAIN);
          };
          set_source_style(id(photo_source_all_label), "All Photos");
          set_source_style(id(photo_source_favorites_label), "Favorites");
          set_source_style(id(photo_source_album_label), "Album");
          set_source_style(id(photo_source_person_label), "Person");
          set_source_style(id(photo_source_tag_label), "Tag");
          set_source_style(id(photo_source_memories_label), "Memories");
          lv_obj_clear_flag(id(photo_source_menu_overlay), LV_OBJ_FLAG_HIDDEN);

  - id: close_photo_source_menu
    mode: single
    then:
      - lambda: |-
          id(photo_source_menu_open) = false;
          id(espframe_core).slideshow().state().last_advance_ms = millis();
          id(last_photo_displayed_ms) = millis();
          lv_obj_add_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(photo_source_menu_overlay), LV_OBJ_FLAG_HIDDEN);
          id(espframe_slideshow_dispatch).execute();

  - id: select_photo_source_from_menu
    mode: single
    then:
      - lambda: |-
          if (!id(photo_source_menu_open)) return;
          std::string source = "All Photos";
          switch (id(photo_source_menu_selection_index)) {
            case 1:
              source = "Favorites";
              break;
            case 2:
              source = "Album";
              break;
            case 3:
              source = "Person";
              break;
            case 4:
              source = "Tag";
              break;
            case 5:
              source = "Memories";
              break;
            case 0:
            default:
              source = "All Photos";
              break;
          }

          auto has_configured_ids = [](std::string value) -> bool {
            value.erase(0, value.find_first_not_of(" \t\r\n,"));
            value.erase(value.find_last_not_of(" \t\r\n,") + 1);
            return !value.empty();
          };

          if (source == "Album" && !has_configured_ids(id(immich_album_ids).state)) {
            lv_label_set_text(id(photo_source_menu_message), "Set up album IDs first.");
            lv_obj_clear_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
            return;
          }
          if (source == "Person" && !has_configured_ids(id(immich_person_ids).state)) {
            lv_label_set_text(id(photo_source_menu_message), "Set up person IDs first.");
            lv_obj_clear_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
            return;
          }
          if (source == "Tag" && !has_configured_ids(id(immich_tag_ids).state)) {
            lv_label_set_text(id(photo_source_menu_message), "Set up tag IDs first.");
            lv_obj_clear_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
            return;
          }

          const bool changed = source != id(photo_source_select).current_option();
          id(photo_source_menu_open) = false;
          id(espframe_core).slideshow().state().last_advance_ms = millis();
          id(last_photo_displayed_ms) = millis();
          lv_obj_add_flag(id(photo_source_menu_message), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(photo_source_menu_overlay), LV_OBJ_FLAG_HIDDEN);

          if (changed) {
            id(espframe_core).slideshow().clear_commands();
            auto call = id(photo_source_select).make_call();
            call.set_option(source);
            call.perform();
          } else {
            id(espframe_slideshow_dispatch).execute();
          }

  - id: log_immich_diag
    mode: restart
    then:
      - lambda: |-
          log_immich_pipeline_diag(id(espframe_core).slideshow().state().diagnostic_reason.c_str(), millis(), id(espframe_core).slideshow().state().last_diagnostic_ms,
            id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().target_slot, id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().portrait,
            id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight, id(espframe_core).slideshow().state().preload_noncritical_in_flight,
            id(espframe_core).slideshow().state().portrait_preload_slot, id(espframe_core).slideshow().state().portrait_preload_left_ready, id(espframe_core).slideshow().state().portrait_preload_right_ready,
            id(espframe_core).slideshow().state().companion_target_slot, id(immich_request_state).api_retries, id(espframe_core).slideshow().state().download_retries,
            id(immich_request_state).retry_cooldown_until_ms);

  # Shared handler for any slot's on_error (retry up to MAX_ERROR_RETRIES)
  - id: handle_slot_download_error
    mode: restart
    then:
      - lambda: |-
          id(espframe_core).slideshow().state().download_retries++;
          int s = id(espframe_core).slideshow().state().last_downloaded_slot;
          ESP_LOGE("immich", "Slot %d decode failed (attempt %d)", s, id(espframe_core).slideshow().state().download_retries);
          auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
          meta.ready = false;
          meta.asset_id = "";
          meta.pending_asset_id = "";
          meta.image_url = "";
      - if:
          condition:
            lambda: 'return id(espframe_core).slideshow().state().download_retries < MAX_ERROR_RETRIES;'
          then:
            - delay: 2s
            - script.execute: immich_prefetch_chain
          else:
            - lambda: 'id(espframe_core).slideshow().state().download_retries = 0;'
            - lambda: |-
                uint32_t cooldown_ms = id(immich_request_state).register_download_failure(millis());
                ESP_LOGW("immich",
                         "Download retries exhausted; pausing fetches for %us (consecutive failures=%d)",
                         (unsigned) (cooldown_ms / 1000), id(immich_request_state).consecutive_failures);

  # Start portrait pair download for the active slot (left then right or companion search)
  - id: immich_start_portrait_active
    mode: restart
    then:
      - lambda: |-
          id(espframe_core).slideshow().start_active_portrait(
            id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2, id(espframe_core).slideshow().state().portrait,
            id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().portrait_primary_asset_id,
            id(espframe_core).slideshow().state().portrait_companion_url, id(espframe_core).slideshow().state().portrait_search_datetime,
            id(espframe_core).slideshow().state().companion_target_slot);
          id(espframe_slideshow_dispatch).execute();

  # Display whichever slot is active (single image or portrait pair; accent + warm tones)
  - id: immich_display_current
    mode: single
    then:
      - lvgl.page.show: slideshow_page
      - script.execute: hide_connection_failed
      - lambda: |-
          lv_obj_clear_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);

          int s = id(espframe_core).slideshow().state().active_slot;
          esphome::image::Image *imgs[] = { id(immich_img_0), id(immich_img_1), id(immich_img_2) };
          auto *dsc = get_lv_image_descriptor_(imgs[s], 0);
          if (dsc == nullptr || dsc->data == nullptr || imgs[s]->get_width() <= 0 || imgs[s]->get_height() <= 0) {
            ESP_LOGW("immich", "Slot %d descriptor not ready, skipping display update", s);
            id(espframe_core).slideshow().state().diagnostic_reason = "slot descriptor not ready";
            id(log_immich_diag).execute();
            return;
          }
          lv_img_set_src(id(slideshow_img), dsc);

          auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
          lv_img_set_zoom(id(slideshow_img), meta.zoom);
          ESP_LOGI("immich", "SHOW slot %d: %s | %s | %s | portrait=%d", s, meta.asset_id.c_str(), meta.date.c_str(), meta.person.c_str(), meta.is_portrait);
          id(espframe_core).slideshow().begin_display_current(
            s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2, id(espframe_core).slideshow().state().portrait,
            id(portrait_pairing_enabled).state, id(espframe_core).slideshow().state().active_slot_displayed);
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - lambda: |-
          id(espframe_core).slideshow().after_display_current(
            id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2, id(espframe_core).slideshow().state().portrait,
            id(portrait_pairing_enabled).state, id(espframe_core).slideshow().state().active_slot_displayed,
            id(espframe_core).slideshow().state().portrait_preload_slot, id(espframe_core).slideshow().state().portrait_preload_left_ready,
            id(espframe_core).slideshow().state().portrait_preload_right_ready);
          id(espframe_slideshow_dispatch).execute();
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display

  - id: immich_reapply_current_image_layout
    mode: restart
    then:
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display
      - lambda: |-
          id(immich_portrait_left).abort_download();
          id(immich_portrait_right).abort_download();
          id(immich_portrait_preload_left).abort_download();
          id(immich_portrait_preload_right).abort_download();
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          lv_obj_invalidate(id(slideshow_page)->obj);
          id(espframe_core).slideshow().state().portrait = PortraitState{};
          id(espframe_core).slideshow().state().portrait_preload_slot = -1;
          id(espframe_core).slideshow().state().portrait_preload_left_ready = false;
          id(espframe_core).slideshow().state().portrait_preload_right_ready = false;
          if (id(espframe_core).slideshow().state().preload_noncritical_in_flight) {
            id(espframe_core).slideshow().state().preload_noncritical_in_flight = false;
            if (id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight > 0) {
              id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight--;
            }
          }
          if (!id(espframe_core).slideshow().state().active_slot_displayed) return;
          int s = id(espframe_core).slideshow().state().active_slot;
          auto &meta = get_slot(s, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2);
          if (meta.image_url.empty()) return;
          id(espframe_core).slideshow().state().active_slot_displayed = false;
          bool portrait_screen = id(screen_rotation_select).current_option() == "90" ||
                                 id(screen_rotation_select).current_option() == "270";
          int target_w = portrait_screen ? ${portrait_display_width} : ${display_width};
          int target_h = portrait_screen ? ${portrait_display_height} : ${display_height};
          bool fill = portrait_screen
            ? (id(photo_display_mode).current_option() == "Fill")
            : ((id(photo_display_mode).current_option() == "Fill") && !meta.is_portrait);
          auto valign = portrait_screen ? esphome::remote_image::VERTICAL_ALIGN_START : esphome::remote_image::VERTICAL_ALIGN_CENTER;
          if (s == 0) { id(immich_img_0).set_target_size(target_w, target_h); id(immich_img_0).set_fill_mode(fill); id(immich_img_0).set_vertical_align(valign); id(immich_img_0).set_url(meta.image_url); id(immich_img_0).update(); }
          else if (s == 1) { id(immich_img_1).set_target_size(target_w, target_h); id(immich_img_1).set_fill_mode(fill); id(immich_img_1).set_vertical_align(valign); id(immich_img_1).set_url(meta.image_url); id(immich_img_1).update(); }
          else if (s == 2) { id(immich_img_2).set_target_size(target_w, target_h); id(immich_img_2).set_fill_mode(fill); id(immich_img_2).set_vertical_align(valign); id(immich_img_2).set_url(meta.image_url); id(immich_img_2).update(); }

  # Advance forward: move ring index, display if ready, else fetch into slot
  - id: immich_advance_forward
    mode: single
    then:
      - lambda: |-
          id(espframe_core).slideshow().advance_forward(
            millis(),
            id(immich_request_state).cooldown_active(millis()),
            id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().target_slot, id(espframe_core).slideshow().state().active_slot_displayed,
            id(espframe_core).slideshow().state().last_advance_ms, id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2,
            id(espframe_core).slideshow().state().current_display, id(espframe_core).slideshow().state().previous_display, id(espframe_core).slideshow().state().portrait, id(espframe_core).slideshow().state().slot_flags,
            id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight, id(portrait_pairing_enabled).state,
            id(espframe_core).slideshow().state().portrait_preload_slot, id(espframe_core).slideshow().state().portrait_preload_left_ready,
            id(espframe_core).slideshow().state().portrait_preload_right_ready, id(espframe_core).slideshow().state().diagnostic_reason);
          id(espframe_slideshow_dispatch).execute();

  # Show previous image (swipe back); re-downloads into slot from stored URL
  - id: immich_show_previous
    mode: single
    then:
      - lambda: |-
          id(espframe_core).slideshow().show_previous(
            millis(), id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().active_slot_displayed,
            id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2, id(espframe_core).slideshow().state().current_display,
            id(espframe_core).slideshow().state().previous_display, id(espframe_core).slideshow().state().portrait, id(espframe_core).slideshow().state().slot_flags);
          id(espframe_slideshow_dispatch).execute();

  # Display portrait pair when both left and right images are ready
  - id: immich_display_portrait_pair
    mode: single
    then:
      - lvgl.page.show: slideshow_page
      - script.execute: hide_connection_failed
      - lambda: |-
          const bool portrait_screen = id(screen_rotation_select).current_option() == "90" ||
                                       id(screen_rotation_select).current_option() == "270";
          if (portrait_screen || !id(portrait_pairing_enabled).state) {
            lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
            id(espframe_core).slideshow().state().portrait = PortraitState{};
            return;
          }
          if (!id(espframe_core).slideshow().state().portrait.left_ready || !id(espframe_core).slideshow().state().portrait.right_ready) {
            ESP_LOGW("immich", "Portrait pair display deferred (left_ready=%d right_ready=%d)",
                     id(espframe_core).slideshow().state().portrait.left_ready, id(espframe_core).slideshow().state().portrait.right_ready);
            id(espframe_core).slideshow().state().diagnostic_reason = "portrait pair deferred waiting both loaded";
            id(log_immich_diag).execute();
            id(delayed_prefetch_chain).execute();
            return;
          }
          auto *left_dsc = get_lv_image_descriptor_(id(immich_portrait_left), 0);
          auto *right_dsc = get_lv_image_descriptor_(id(immich_portrait_right), 0);
          if (left_dsc == nullptr || right_dsc == nullptr ||
              left_dsc->data == nullptr || right_dsc->data == nullptr ||
              id(immich_portrait_left).get_width() <= 0 || id(immich_portrait_left).get_height() <= 0 ||
              id(immich_portrait_right).get_width() <= 0 || id(immich_portrait_right).get_height() <= 0) {
            ESP_LOGW("immich", "Portrait pair descriptors not ready; falling back to single display");
            id(espframe_core).slideshow().state().diagnostic_reason = "portrait pair descriptor not ready";
            id(log_immich_diag).execute();
            id(espframe_core).slideshow().state().portrait.left_ready = false;
            id(espframe_core).slideshow().state().portrait.right_ready = false;
            id(espframe_core).slideshow().state().portrait.is_pair = false;
            id(espframe_core).slideshow().state().portrait.workflow_busy = false;
            id(espframe_core).slideshow().state().active_slot_displayed = true;
            id(immich_display_current).execute();
            return;
          }
          lv_img_set_src(id(portrait_left_img), left_dsc);
          lv_img_set_src(id(portrait_right_img), right_dsc);
          id(espframe_core).slideshow().state().portrait.is_pair = true;
          id(espframe_core).slideshow().state().active_slot_displayed = true;
          id(espframe_core).slideshow().state().portrait.workflow_busy = false;
          lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          ESP_LOGI("immich", "PAIR displayed for slot %d", id(espframe_core).slideshow().state().active_slot);
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display
      - script.execute: delayed_prefetch_chain

  # Refresh the photo date/location metadata overlay beneath the clock.
  - id: update_photo_metadata_display
    mode: single
    then:
      - lambda: |-
          std::string location_text;
          std::string date_text;
          if (id(espframe_core).slideshow().state().active_slot_displayed) {
            if (id(photo_metadata_location_enabled).state && !id(espframe_core).slideshow().state().current_display.location.empty()) {
              location_text = id(espframe_core).slideshow().state().current_display.location;
            }
            if (id(photo_metadata_date_enabled).state) {
              const std::string mode = id(photo_metadata_date_format).current_option();
              if (mode == "Relative Date") {
                auto now = id(sntp_time).now();
                if (now.is_valid()) {
                  date_text = format_photo_age(id(espframe_core).slideshow().state().current_display.year, id(espframe_core).slideshow().state().current_display.month, id(espframe_core).slideshow().state().current_display.day,
                                               now.year, now.month, now.day_of_month);
                }
              } else {
                const std::string format = id(photo_metadata_date_taken_format).current_option();
                if (format == "January 1, 2026" || format == "January 1, 2000" || format == "Month Day, Year") {
                  date_text = format_photo_date_month_day_year(id(espframe_core).slideshow().state().current_display.year, id(espframe_core).slideshow().state().current_display.month, id(espframe_core).slideshow().state().current_display.day);
                } else {
                  date_text = id(espframe_core).slideshow().state().current_display.date;
                }
              }
            }
          }

          const bool has_location = !location_text.empty();
          const bool has_date = !date_text.empty();
          lv_label_set_text(id(photo_metadata_location_label), location_text.c_str());
          lv_label_set_text(id(photo_metadata_location_label_shadow), location_text.c_str());
          lv_label_set_text(id(photo_metadata_date_label), date_text.c_str());
          lv_label_set_text(id(photo_metadata_date_label_shadow), date_text.c_str());
          lv_label_set_text(id(portrait_metadata_location_label), location_text.c_str());
          lv_label_set_text(id(portrait_metadata_location_label_shadow), location_text.c_str());
          lv_label_set_text(id(portrait_metadata_date_label), date_text.c_str());
          lv_label_set_text(id(portrait_metadata_date_label_shadow), date_text.c_str());

          const bool portrait_screen = id(screen_rotation_select).current_option() == "90" ||
                                       id(screen_rotation_select).current_option() == "270";

          if (has_location && !portrait_screen) {
            lv_obj_clear_flag(id(photo_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(photo_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(photo_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(photo_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }
          if (has_date && !portrait_screen) {
            lv_obj_clear_flag(id(photo_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(photo_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(photo_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(photo_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }

          if (has_location && portrait_screen) {
            lv_obj_clear_flag(id(portrait_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(portrait_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(portrait_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(portrait_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }
          if (has_date && portrait_screen) {
            lv_obj_clear_flag(id(portrait_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(portrait_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(portrait_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(portrait_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }

          lv_obj_update_layout(id(info_overlay));
          const int32_t metadata_width = lv_obj_get_width(id(info_overlay));
          lv_obj_set_width(id(photo_metadata_overlay), metadata_width);
          lv_obj_set_width(id(photo_metadata_shadow_row), metadata_width);
          lv_obj_set_width(id(photo_metadata_row), metadata_width);
          lv_obj_set_width(id(photo_metadata_location_label), metadata_width);
          lv_obj_set_width(id(photo_metadata_location_label_shadow), metadata_width);
          lv_obj_set_width(id(photo_metadata_date_label), metadata_width);
          lv_obj_set_width(id(photo_metadata_date_label_shadow), metadata_width);

          if (portrait_screen || (!has_location && !has_date)) {
            lv_obj_add_flag(id(photo_metadata_overlay), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(photo_metadata_overlay), LV_OBJ_FLAG_HIDDEN);
          }

  # Prefetch chain: fill the next empty slot(s) ahead of active_slot (skipped when backlight paused)
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          if (id(photo_source_menu_open)) return;
          id(espframe_core).slideshow().request_prefetch(
            id(backlight_paused),
            id(immich_request_state).cooldown_active(millis()),
            millis(), id(espframe_core).slideshow().state().last_prefetch_start_ms, id(espframe_core).slideshow().state().active_slot, id(espframe_core).slideshow().state().target_slot,
            id(espframe_core).slideshow().state().slot0, id(espframe_core).slideshow().state().slot1, id(espframe_core).slideshow().state().slot2, id(espframe_core).slideshow().state().slot_flags, id(espframe_core).slideshow().state().fetch_queue, id(espframe_core).slideshow().state().portrait,
            id(espframe_core).slideshow().state().active_slot_displayed, id(espframe_core).slideshow().state().noncritical_remote_updates_in_flight, id(espframe_core).slideshow().state().portrait_preload_slot,
            id(espframe_core).slideshow().state().portrait_preload_left_ready, id(espframe_core).slideshow().state().portrait_preload_right_ready);
          id(espframe_slideshow_dispatch).execute();

  # Run prefetch after short delay to avoid socket exhaustion when many callbacks fire at once
  - id: delayed_prefetch_chain
    mode: restart
    then:
      - delay: 1200ms
      - script.execute: immich_prefetch_chain

  # Defer companion search when started from advance so interval callback returns quickly
  - id: deferred_companion_search
    mode: restart
    then:
      - delay: 400ms
      - script.execute: immich_fetch_portrait_companion

  # When advance finds slot not ready, defer fetch so interval callback returns quickly
  - id: deferred_fetch_into_slot
    mode: single
    then:
      - lambda: 'id(espframe_core).slideshow().state().deferred_fetch_target = id(espframe_core).slideshow().state().target_slot;'
      - delay: 400ms
      - lambda: 'id(espframe_core).slideshow().state().target_slot = id(espframe_core).slideshow().state().deferred_fetch_target;'
      - script.execute: immich_fetch_into_slot

  # Per-slot deferred update scripts — split from a single shared script to avoid
  # collisions when two API responses arrive within 150ms of each other.
  # Per-slot deferred update scripts — split to avoid collisions when two API
  # responses arrive within 150ms of each other.
