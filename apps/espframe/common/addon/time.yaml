# =============================================================================
# TIME & CLOCK - Timezone, format, and on-screen clock
# =============================================================================
# SNTP time sync plus user-configurable timezone (long list with GMT labels)
# and 12/24 hour format. The on-screen clock is updated on sync and every
# 60 seconds; timezone changes also trigger sunrise/sunset recalculation for
# backlight schedule. The "Clock: Show" switch controls visibility of the
# clock overlay.
# =============================================================================

# -----------------------------------------------------------------------------
# Default NTP servers (can be overridden by substitutions or the web UI)
# -----------------------------------------------------------------------------
substitutions:
  ntp_server_1: "0.pool.ntp.org"
  ntp_server_2: "1.pool.ntp.org"
  ntp_server_3: "2.pool.ntp.org"

esphome:
  on_boot:
    - priority: -200
      then:
        - script.execute: apply_ntp_servers

# -----------------------------------------------------------------------------
# Clock format (12/24h) and timezone selection
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Clock: NTP Server 1"
    id: ntp_server_1_text
    internal: true
    entity_category: config
    optimistic: false
    restore_value: true
    initial_value: "${ntp_server_1}"
    min_length: 0
    max_length: 253
    mode: text
    icon: "mdi:server-network"
    web_server:
      sorting_group_id: sg_clock
    set_action:
      - lambda: |-
          std::string server = espframe_trim_ntp_server(x);
          if (!espframe_is_valid_ntp_server(server)) {
            ESP_LOGW("sntp", "Invalid NTP server: %s", x.c_str());
            return;
          }
          id(ntp_server_1_text).publish_state(server);
      - script.execute: apply_ntp_servers

  - platform: template
    name: "Clock: NTP Server 2"
    id: ntp_server_2_text
    internal: true
    entity_category: config
    optimistic: false
    restore_value: true
    initial_value: "${ntp_server_2}"
    min_length: 0
    max_length: 253
    mode: text
    icon: "mdi:server-network"
    web_server:
      sorting_group_id: sg_clock
    set_action:
      - lambda: |-
          std::string server = espframe_trim_ntp_server(x);
          if (!espframe_is_valid_ntp_server(server)) {
            ESP_LOGW("sntp", "Invalid NTP server: %s", x.c_str());
            return;
          }
          id(ntp_server_2_text).publish_state(server);
      - script.execute: apply_ntp_servers

  - platform: template
    name: "Clock: NTP Server 3"
    id: ntp_server_3_text
    internal: true
    entity_category: config
    optimistic: false
    restore_value: true
    initial_value: "${ntp_server_3}"
    min_length: 0
    max_length: 253
    mode: text
    icon: "mdi:server-network"
    web_server:
      sorting_group_id: sg_clock
    set_action:
      - lambda: |-
          std::string server = espframe_trim_ntp_server(x);
          if (!espframe_is_valid_ntp_server(server)) {
            ESP_LOGW("sntp", "Invalid NTP server: %s", x.c_str());
            return;
          }
          id(ntp_server_3_text).publish_state(server);
      - script.execute: apply_ntp_servers

select:
  - platform: template
    name: "Clock: Format"
    id: clock_format_select
    internal: true
    # ESPFRAME:SETTING_FIELDS clock_format START
    options:
      - "24 Hour"
      - "12 Hour"
    initial_option: "24 Hour"
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS clock_format END
    web_server:
      sorting_group_id: sg_clock
    on_value:
      then:
        - script.execute: update_clock_display

  # Options list must match components/espframe/timezones.py (single source of truth).
