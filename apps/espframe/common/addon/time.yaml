# -----------------------------------------------------------------------------
# Clock visibility and display update script
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Clock: Show"
    id: show_clock
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:clock-outline"
    web_server:
      sorting_group_id: sg_clock

# -----------------------------------------------------------------------------
# Refresh clock label from current time; show/hide based on switch
# -----------------------------------------------------------------------------
script:
  - id: apply_ntp_servers
    mode: restart
    then:
      - lambda: |-
          espframe_apply_sntp_servers(
            id(ntp_server_1_text).state,
            id(ntp_server_2_text).state,
            id(ntp_server_3_text).state
          );

  - id: update_clock_display
    mode: single
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;
          int hour = now.hour;
          char buf[6];
          if (id(clock_format_select).current_option() == "12 Hour") {
            hour = hour % 12;
            if (hour == 0) hour = 12;
            snprintf(buf, sizeof(buf), "%d:%02d", hour, now.minute);
          } else {
            snprintf(buf, sizeof(buf), "%02d:%02d", hour, now.minute);
          }
          lv_label_set_text(id(time_label), buf);
          lv_label_set_text(id(time_label_shadow), buf);
          lv_obj_align(id(clock_container), LV_ALIGN_BOTTOM_LEFT, 45, -20);
          if (id(show_clock).state && id(espframe_core).slideshow().state().active_slot_displayed) {
            lv_obj_clear_flag(id(clock_container), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(clock_container), LV_OBJ_FLAG_HIDDEN);
          }

# -----------------------------------------------------------------------------
# SNTP time source; sync triggers clock and schedule updates
# -----------------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"
    servers:
      - "${ntp_server_1}"
      - "${ntp_server_2}"
      - "${ntp_server_3}"
    on_time_sync:
      then:
        - script.execute: update_clock_display
        - script.execute: update_photo_metadata_display
        - script.execute: backlight_recalc_sunrise_sunset
        - script.execute: screen_schedule_check

# -----------------------------------------------------------------------------
# Unified 60-second periodic interval for clock, backlight, and warm tones
# -----------------------------------------------------------------------------
interval:
  - interval: 60s
    then:
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display
      - script.execute: backlight_periodic_check
      - script.execute: warm_tone_periodic_check
