# =============================================================================
# SCREEN ROTATION - Runtime LVGL display orientation
# =============================================================================
# Uses ESPHome 2026.4 LVGL rotation so display content and touch input rotate
# together. Device packages map the user-facing option to each panel's
# LVGL-native rotation values.
# =============================================================================

select:
  - platform: template
    name: "Screen: Rotation"
    id: screen_rotation_select
    internal: true
    # ESPFRAME:SETTING_FIELDS screen_rotation START
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    initial_option: "${screen_rotation}"
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS screen_rotation END
    icon: "mdi:screen-rotation"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - lambda: 'ESP_LOGI("screen", "Screen rotation: %s degrees", x.c_str());'
        - script.execute: screen_apply_rotation

esphome:
  on_boot:
    - priority: -150
      then:
        - script.execute: screen_apply_rotation

script:
  - id: screen_apply_rotation
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const std::string current = id(screen_rotation_select).current_option();
              return !id(developer_features_enabled).state && (current == "90" || current == "270");
          then:
            - select.set:
                id: screen_rotation_select
                option: "0"
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "0";'
          then:
            - lvgl.display.set_rotation: ${screen_rotation_0}
            - switch.turn_on: portrait_pairing_enabled
            - delay: 100ms
            - script.execute: immich_reapply_current_image_layout
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: ${screen_rotation_90}
            - switch.turn_off: portrait_pairing_enabled
            - delay: 100ms
            - script.execute: immich_reapply_current_image_layout
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "180";'
          then:
            - lvgl.display.set_rotation: ${screen_rotation_180}
            - switch.turn_on: portrait_pairing_enabled
            - delay: 100ms
            - script.execute: immich_reapply_current_image_layout
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "270";'
          then:
            - lvgl.display.set_rotation: ${screen_rotation_270}
            - switch.turn_off: portrait_pairing_enabled
            - delay: 100ms
            - script.execute: immich_reapply_current_image_layout
