; CYD Clock — ESP32-2432S028 (Cheap Yellow Display)
;
; Board: ESP32-2432S028R (2.8" ILI9341 320x240 + XPT2046 touch)
; Flash:  pnpm nx run cyd-clock:flash
; Flash filesystem (web config UI):  pnpm nx run cyd-clock:flash-fs
; Serial monitor:  pnpm nx run cyd-clock:monitor

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    arduino-libraries/NTPClient@^3.2.1
    bblanchon/ArduinoJson@^7.0.3
    https://github.com/tzapu/WiFiManager.git

; TFT_eSPI config for CYD (ILI9341, two SPI buses)
; Display: VSPI  Touch: HSPI
build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
