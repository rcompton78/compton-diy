; CYD Clock — ESP32-2432S028 (Cheap Yellow Display)
;
; Board: ESP32-2432S028R (2.8" ILI9341 320x240 + XPT2046 touch)
; Flash:  pnpm nx run cyd-clock:flash-cyd
; Flash filesystem (web config UI):  pnpm nx run cyd-clock:flash-fs
; Serial monitor:  pnpm nx run cyd-clock:monitor

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.filesystem = littlefs

lib_extra_dirs = ../../libs

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    arduino-libraries/NTPClient@^3.2.1
    bblanchon/ArduinoJson@^7.0.3
    https://github.com/tzapu/WiFiManager.git

; TFT_eSPI config for CYD (ST7789 driver, two SPI buses)
; Display: VSPI  Touch: HSPI  rotation=0 → portrait 240×320, USB at bottom
build_flags =
    -D BOARD_CYD=1
    -D FIRMWARE_VERSION=\"${sysenv.RELEASE_VERSION}\"
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D CGRAM_OFFSET=1
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

; Freenove ESP32-S3 2.8" display — ILI9341 + FT6336U capacitive touch
[env:freenove-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_extra_dirs = ../../libs

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/aselectroworks/Arduino-FT6336U.git#a439f3963c2ba85954debb880c84e35944d362a7
    arduino-libraries/NTPClient@^3.2.1
    bblanchon/ArduinoJson@^7.0.3
    https://github.com/tzapu/WiFiManager.git

build_flags =
    -D BOARD_FREENOVE_S3=1
    -D FIRMWARE_VERSION=\"${sysenv.RELEASE_VERSION}\"
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_ON=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=13
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=46
    -D TFT_RST=-1
    -D TFT_BL=45
    -D TFT_BACKLIGHT_ON=HIGH
    -D SPI_FREQUENCY=40000000
    -D USE_HSPI_PORT=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
