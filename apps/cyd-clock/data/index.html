<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CYD Clock Config</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin-top: 12px; font-size: 0.9em; color: #555; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 20px; width: 100%; padding: 10px; background: #0070f3; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
    #msg { margin-top: 12px; color: green; display: none; }
  </style>
</head>
<body>
  <h2>CYD Clock</h2>
  <form id="form">
    <label>Latitude</label>
    <input type="number" step="0.0001" id="lat" name="lat">
    <label>Longitude</label>
    <input type="number" step="0.0001" id="lon" name="lon">
    <label>UTC Offset (seconds)</label>
    <input type="number" id="utc" name="utc">
    <label>Timezone string (e.g. MST7MDT)</label>
    <input type="text" id="tz" name="tz">
    <button type="submit">Save &amp; Restart</button>
  </form>
  <p id="msg">Saved! Restarting...</p>
  <script>
    fetch('/config').then(r => r.json()).then(d => {
      document.getElementById('lat').value = d.lat;
      document.getElementById('lon').value = d.lon;
      document.getElementById('utc').value = d.utc;
      document.getElementById('tz').value  = d.tz;
    });
    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const body = { lat: +lat.value, lon: +lon.value, utc: +utc.value, tz: tz.value };
      fetch('/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
        .then(() => { document.getElementById('msg').style.display = 'block'; });
    });
  </script>
</body>
</html>
