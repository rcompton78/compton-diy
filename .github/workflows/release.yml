name: CI

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get last version tag
        id: last_tag
        run: |
          git fetch --all --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          LAST_TAG_SHA=$(git show-ref --hash "$LAST_TAG" 2>/dev/null | head -n 1 || echo "$LAST_TAG")
          echo "sha=$LAST_TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG ($LAST_TAG_SHA)"

      - name: Build affected firmware
        run: |
          pnpm nx affected --base ${{ steps.last_tag.outputs.sha }} -t build
          pnpm nx affected --base ${{ steps.last_tag.outputs.sha }} -t build-fs

      - name: Generate releases
        run: pnpm nx affected --base ${{ steps.last_tag.outputs.sha }} -t release
        env:
          RELEASE_VERSION: latest

      - name: Generate flasher index
        run: python3 tools/esp-flasher/generate_index.py --version=latest

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Version affected projects
        run: pnpm nx affected --base ${{ steps.last_tag.outputs.sha }} -t version --parallel 1
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin master --follow-tags

  deploy-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
