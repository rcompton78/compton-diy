name: CI

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compute version
        id: version
        run: |
          echo "version=$(date -u +%Y.%m.%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Compute affected base
        id: base
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          BASE="$EVENT_BEFORE"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE=$(git rev-parse HEAD~1)
          fi
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: |
          pip install platformio
          python3 -m platformio system info

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Configure private registry auth
        run: echo "//rcompton78.bytesafe.dev/r/compton/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Node dependencies
        run: pnpm install

      - name: Build all firmware
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pnpm nx run-many -t build
          pnpm nx run-many -t build-fs

      - name: Generate releases
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm nx run-many -t release

      - name: Generate flasher index
        run: python3 tools/esp-flasher/generate_index.py --version="${{ steps.version.outputs.version }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Determine affected firmware projects
        id: affected
        env:
          BASE_SHA: ${{ steps.base.outputs.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          PROJECTS=$(pnpm nx show projects --affected --withTarget release \
            --base="$BASE_SHA" --head="$HEAD_SHA" --json \
            | jq -r '.[]')
          {
            echo "projects<<EOF"
            echo "$PROJECTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.affected.outputs.projects != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AFFECTED_PROJECTS: ${{ steps.affected.outputs.projects }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          shopt -s nullglob
          ASSETS=()
          while IFS= read -r project; do
            [ -z "$project" ] && continue
            ASSETS+=(dist/"$project"/*-ota.bin)
          done <<< "$AFFECTED_PROJECTS"

          gh release create "$RELEASE_VERSION" \
            "${ASSETS[@]}" \
            --title "Firmware $RELEASE_VERSION" \
            --notes "Automated build from $COMMIT_SHA. Changed: $(echo "$AFFECTED_PROJECTS" | paste -sd, -). Upload the *-ota.bin matching your device via its config portal's Update page."

  deploy-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
