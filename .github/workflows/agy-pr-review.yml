name: Antigravity PR Review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: agy-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Fork PRs don't get repo secrets, but skip explicitly rather than
    # letting the step fail on a missing key.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # NOTE: currently non-functional -- run_agy_sdk's own policy list
      # evaluates policy.deny_all() before policy.allow(github_mcp), so
      # every tool call is denied regardless of trust-workspace/
      # sandbox-profile. Left in place pending an upstream fix.
      - name: Run Antigravity review
        uses: rsamborski/run-agy-sdk@90e944e2f0d1bfcc392c954cd937f7d3b36d1441
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: review
          prompt: /antigravity-review
          trust-workspace: 'true'
          sandbox-profile: 'false'
