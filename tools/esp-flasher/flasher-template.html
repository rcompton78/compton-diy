<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{APP_NAME}} Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    .version { color: #666; font-size: 0.85rem; margin-bottom: 32px; }
    .steps {
      text-align: left;
      background: #111;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 28px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .steps ol { margin: 0; padding-left: 20px; }
    esp-web-install-button {
      display: block;
      margin-bottom: 16px;
    }
    esp-web-install-button::part(button) {
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    esp-web-install-button::part(button):hover { background: #0060d0; }
    .note { font-size: 0.8rem; color: #555; }
    a { color: #0070f3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{APP_NAME}}</h1>
    <p class="version">v{{VERSION}}</p>

    <div class="steps">
      <ol>
        <li>Connect your ESP32 via USB</li>
        <li>Click <strong>Install</strong> below</li>
        <li>Select the correct COM/serial port</li>
        <li>Wait for flashing to complete (~30s)</li>
      </ol>
    </div>

    <esp-web-install-button manifest="{{MANIFEST}}"></esp-web-install-button>

    <p class="note">
      Requires Chrome or Edge with Web Serial support.<br>
      <a href="https://github.com/rcompton78/compton-diy/tree/master/apps/{{APP_SLUG}}">View source</a>
    </p>
  </div>
</body>
</html>
